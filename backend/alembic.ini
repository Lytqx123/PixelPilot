[alembic]
script_location = alembic
# sqlalchemy.url 由 alembic/env.py 在运行时从环境变量 DATABASE_URL 注入，
# 此处保留占位值仅用于 alembic 命令行无环境变量时的兜底（生产环境务必通过 .env 覆盖）
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/pixelpulse

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S